<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韓国語入門 フラッシュカード｜IPA発音表記つき</title>
<style>
  :root{
    --ink:#22335B; --blue:#4472C4; --blue-d:#33569E; --sky:#EAF1F9;
    --pale:#DEEAF1; --orange:#ED7D31; --green:#4E9A51; --gray:#8B97AD;
    --card-w:min(92vw,520px); --card-h:min(60vw,340px);
    --kfont:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    --jfont:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
    --ipafont:"Charis SIL","Gentium Plus","Segoe UI","Noto Sans",serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--jfont); background:var(--sky); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center}
  header{width:100%; background:var(--blue); color:#fff; padding:13px 16px 11px; text-align:center}
  header h1{font-size:1.02rem; font-weight:700}
  header p{font-size:.73rem; color:var(--pale); margin-top:2px}
  main{flex:1; width:100%; max-width:660px; display:flex; flex-direction:column;
    align-items:center; padding:14px 14px 28px; gap:14px}

  /* set picker */
  .sets{width:100%; display:flex; gap:8px; overflow-x:auto; padding:2px 2px 6px;
    -webkit-overflow-scrolling:touch}
  .sets::-webkit-scrollbar{height:4px}
  .sets::-webkit-scrollbar-thumb{background:#c6d4e8; border-radius:99px}
  .chip{flex:0 0 auto; font-family:var(--jfont); font-size:.8rem; font-weight:700;
    padding:8px 13px; border-radius:99px; border:1.5px solid #c6d4e8;
    background:#fff; color:var(--ink); cursor:pointer}
  .chip[aria-pressed="true"]{background:var(--blue); border-color:var(--blue); color:#fff}
  .chip:focus-visible{outline:3px solid var(--orange); outline-offset:2px}

  /* progress */
  .progress{width:var(--card-w)}
  .progress .bar{height:8px; background:#fff; border-radius:99px; overflow:hidden;
    box-shadow:inset 0 0 0 1px #d3dfef}
  .progress .fill{height:100%; width:0%; background:var(--blue); border-radius:99px;
    transition:width .35s ease}
  .progress .nums{display:flex; justify-content:space-between; font-size:.78rem;
    color:var(--gray); margin-top:5px}
  .nums .ok{color:var(--green); font-weight:700}
  .nums .again{color:var(--orange); font-weight:700}

  /* card */
  .stage{perspective:1200px; position:relative}
  .stage::before,.stage::after{content:""; position:absolute; inset:0; border-radius:18px;
    background:#fff; box-shadow:0 2px 6px rgba(34,51,91,.10)}
  .stage::before{transform:translate(7px,9px) rotate(1.4deg); z-index:0}
  .stage::after{transform:translate(-6px,7px) rotate(-1.1deg); z-index:0}
  .card{position:relative; z-index:2; width:var(--card-w); height:var(--card-h);
    cursor:pointer; transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.7,.3,1)}
  .card.flipped{transform:rotateX(180deg)}
  .face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    background:#fff; border-radius:18px; box-shadow:0 10px 24px rgba(34,51,91,.16);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-bottom:6px solid var(--blue); overflow:hidden; padding:20px}
  .face.back{transform:rotateX(180deg); border-bottom-color:var(--orange)}
  .face::before{content:""; position:absolute; top:14px; left:16px; width:16px; height:16px;
    border-radius:50%; background:var(--sky); box-shadow:inset 0 1px 3px rgba(34,51,91,.35)}
  .face .tag{position:absolute; top:13px; right:16px; font-size:.7rem; color:var(--gray);
    letter-spacing:.06em}
  .word-ko{font-family:var(--kfont); font-weight:800; color:var(--ink); text-align:center;
    font-size:clamp(2.2rem,11vw,4.2rem); line-height:1.15; word-break:keep-all}
  .word-ja{font-weight:800; text-align:center; font-size:clamp(1.5rem,7vw,2.4rem); line-height:1.25}
  .ipa{font-family:var(--ipafont); color:var(--blue-d); background:var(--sky);
    border-radius:8px; padding:3px 12px; margin-top:12px;
    font-size:clamp(1rem,4vw,1.35rem); letter-spacing:.02em}
  .hint{position:absolute; bottom:12px; font-size:.7rem; color:var(--gray)}

  /* controls */
  .row{display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap}
  button{font-family:var(--jfont); border:none; border-radius:12px; cursor:pointer;
    font-size:.95rem; font-weight:700; padding:12px 18px; color:#fff;
    background:var(--blue); box-shadow:0 3px 0 var(--blue-d);
    transition:transform .08s ease}
  button:active{transform:translateY(2px); box-shadow:0 1px 0 var(--blue-d)}
  button:focus-visible{outline:3px solid var(--orange); outline-offset:2px}
  button.ghost{background:#fff; color:var(--ink); box-shadow:0 3px 0 #ccd6e6}
  button.ok{background:var(--green); box-shadow:0 3px 0 #38713B}
  button.again{background:var(--orange); box-shadow:0 3px 0 #B85E20}
  button.small{font-size:.82rem; padding:9px 14px}
  button:disabled{filter:grayscale(.6) opacity(.55); cursor:default}
  .judge{min-height:52px}

  .done{display:none; flex-direction:column; align-items:center; gap:14px;
    background:#fff; border-radius:18px; padding:28px 24px; width:var(--card-w);
    box-shadow:0 10px 24px rgba(34,51,91,.16); text-align:center;
    border-bottom:6px solid var(--green)}
  .done h2{font-size:1.35rem}
  .done .score{font-size:1rem; color:var(--gray)}
  .done .score b{font-size:1.3rem}

  footer{font-size:.68rem; color:var(--gray); padding:10px 14px 16px; text-align:center}

  @media (prefers-reduced-motion: reduce){
    .card{transition:none}
    .progress .fill{transition:none}
  }
</style>
</head>
<body>
<header>
  <h1>韓国語入門 フラッシュカード 🇰🇷</h1>
  <p>IPA発音表記つき｜カードをタップすると裏返ります</p>
</header>

<main>
  <div class="sets" id="sets" role="tablist" aria-label="単語セットを選ぶ"></div>

  <div class="progress">
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="nums">
      <span id="pos">1 / 0</span>
      <span><span class="ok" id="okN">○ 0</span>　<span class="again" id="agN">△ 0</span></span>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="card" id="card" role="button" tabindex="0" aria-label="カードをめくる">
      <div class="face front">
        <span class="tag" id="tagF">韓国語</span>
        <div id="frontWord" class="word-ko"></div>
        <div class="ipa" id="frontIpa"></div>
        <div class="hint">タップ / スペースキーでめくる</div>
      </div>
      <div class="face back">
        <span class="tag" id="tagB">意味</span>
        <div id="backWord" class="word-ja"></div>
        <div class="ipa" id="backIpa" style="display:none"></div>
        <div class="hint">覚えたら ○、まだなら △</div>
      </div>
    </div>
  </div>

  <div class="row judge" id="judge" style="visibility:hidden">
    <button class="ok" id="btnOk">○ 覚えた！</button>
    <button class="again" id="btnAgain">△ もう一度</button>
  </div>

  <div class="row">
    <button class="ghost small" id="btnDir">🔁 日本語 → 韓国語 に切替</button>
    <button class="ghost small" id="btnShuffle">🔀 シャッフル</button>
  </div>

  <div class="done" id="done">
    <h2>🎉 １周おつかれさま！</h2>
    <div class="score">覚えた <b id="doneOk" style="color:var(--green)">0</b> 語 ／
      もう一度 <b id="doneAg" style="color:var(--orange)">0</b> 語</div>
    <div class="row">
      <button id="btnRetryAgain" class="again">△ の単語だけ復習</button>
      <button id="btnRestart">はじめから</button>
    </div>
  </div>
</main>

<footer>韓国語入門テキスト（한국어）準拠｜発音表記はテキストの方式に基づくIPA（語中の有声音化・濃音化などを反映）</footer>

  {s:8, ko:"커뮤니케이션학", ipa:"kʰɔmjunikʰeiʃɔnhaᵏ", ja:"コミュニケーション学"},
  {s:8, ko:"독서",     ipa:"tokˀsɔ",        ja:"読書"},
  {s:8, ko:"영화감상", ipa:"jɔŋhwagamsaŋ",  ja:"映画鑑賞"},
  {s:8, ko:"댄스",     ipa:"tɛnsɯ",         ja:"ダンス"},
  {s:8, ko:"음악감상", ipa:"ɯmaᵏˀkamsaŋ",   ja:"音楽鑑賞"},
  {s:8, ko:"노래",     ipa:"norɛ",          ja:"歌"},
  {s:8, ko:"스포츠 관전", ipa:"sɯpʰotʃʰɯ gwandʒɔn", ja:"スポーツ観戦"},
  {s:8, ko:"인터넷",   ipa:"intʰɔneᵗ",      ja:"インターネット"},
];

let curSet = 0;            // -1 = 全部
let pool = [];             // word objects of the active set
let deck = [];             // indices into pool
let cur = 0, flipped = false, dirKoFirst = true;
let okSet = new Set(), againSet = new Set();
const $ = id => document.getElementById(id);
const card = $("card");

function buildChips(){
  const box = $("sets");
  const all = document.createElement("button");
  all.className = "chip"; all.textContent = "すべて (" + WORDS.length + ")";
  all.setAttribute("aria-pressed", curSet === -1);
  all.addEventListener("click", ()=>selectSet(-1));
  box.appendChild(all);
  SETS.forEach((name, i)=>{
    const n = WORDS.filter(w=>w.s===i).length;
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = name + " (" + n + ")";
    b.setAttribute("aria-pressed", curSet === i);
    b.addEventListener("click", ()=>selectSet(i));
    box.appendChild(b);
  });
}
function refreshChips(){
  [...$("sets").children].forEach((b, idx)=>{
    b.setAttribute("aria-pressed", (idx-1) === curSet || (idx===0 && curSet===-1));
  });
}
function selectSet(i){
  curSet = i;
  refreshChips();
  pool = curSet === -1 ? WORDS.slice() : WORDS.filter(w=>w.s===curSet);
  restart(pool.map((_,k)=>k));
}

function render(){
  $("fill").style.width = pool.length ? ((okSet.size + againSet.size) / pool.length * 100) + "%" : "0%";
  $("pos").textContent = Math.min(cur+1, deck.length) + " / " + deck.length;
  $("okN").textContent = "○ " + okSet.size;
  $("agN").textContent = "△ " + againSet.size;
  if(cur >= deck.length){ showDone(); return; }
  const w = pool[deck[cur]];
  if(dirKoFirst){
    $("tagF").textContent = "韓国語";
    $("frontWord").className = "word-ko"; $("frontWord").textContent = w.ko;
    $("frontIpa").style.display = ""; $("frontIpa").textContent = "[" + w.ipa + "]";
    $("tagB").textContent = "意味";
    $("backWord").className = "word-ja"; $("backWord").textContent = w.ja;
    $("backIpa").style.display = "none";
  }else{
    $("tagF").textContent = "意味";
    $("frontWord").className = "word-ja"; $("frontWord").textContent = w.ja;
    $("frontIpa").style.display = "none";
    $("tagB").textContent = "韓国語";
    $("backWord").className = "word-ko"; $("backWord").textContent = w.ko;
    $("backIpa").style.display = ""; $("backIpa").textContent = "[" + w.ipa + "]";
  }
  flipped = false;
  card.classList.remove("flipped");
  $("judge").style.visibility = "hidden";
}

function flip(){
  if(cur >= deck.length) return;
  flipped = !flipped;
  card.classList.toggle("flipped", flipped);
  if(flipped) $("judge").style.visibility = "visible";
}
function next(judgeOk){
  const idx = deck[cur];
  if(judgeOk){ okSet.add(idx); againSet.delete(idx); }
  else{ againSet.add(idx); okSet.delete(idx); }
  cur++;
  render();
}
function showDone(){
  $("stage").style.display = "none";
  $("judge").style.display = "none";
  $("done").style.display = "flex";
  $("doneOk").textContent = okSet.size;
  $("doneAg").textContent = againSet.size;
  $("btnRetryAgain").disabled = againSet.size === 0;
}
function restart(indices){
  deck = indices.slice();
  cur = 0; okSet = new Set(); againSet = new Set();
  $("stage").style.display = "";
  $("judge").style.display = "";
  $("done").style.display = "none";
  render();
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

card.addEventListener("click", flip);
card.addEventListener("keydown", e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault(); flip();} });
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight" && flipped) next(true);
  if(e.key==="ArrowLeft"  && flipped) next(false);
});
$("btnOk").addEventListener("click", ()=>next(true));
$("btnAgain").addEventListener("click", ()=>next(false));
$("btnShuffle").addEventListener("click", ()=>restart(shuffle(pool.map((_,k)=>k))));
$("btnDir").addEventListener("click", function(){
  dirKoFirst = !dirKoFirst;
  this.textContent = dirKoFirst ? "🔁 日本語 → 韓国語 に切替" : "🔁 韓国語 → 日本語 に切替";
  render();
});
$("btnRestart").addEventListener("click", ()=>restart(pool.map((_,k)=>k)));
$("btnRetryAgain").addEventListener("click", ()=>restart(shuffle([...againSet])));

buildChips();
selectSet(0);
</script>
</body>
</html>
