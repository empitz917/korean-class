<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 단어 플래시카드 1~7과</title>
<style>
:root{
  --paper:#FBF8F2;
  --ink:#22303E;
  --sub:#7A8694;
  --accent:#2F7E77;      /* 청록 */
  --accent-soft:#E3F0EE;
  --warn:#C96A50;        /* 감빛 */
  --warn-soft:#F8E8E2;
  --card:#FFFFFF;
  --line:#E7E1D6;
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:"Hiragino Sans","Yu Gothic","Noto Sans KR","Malgun Gothic",sans-serif;
  background:var(--paper);color:var(--ink);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px 16px 40px;
}
.wrap{width:100%;max-width:520px}
header{text-align:center;margin-bottom:20px}
h1{font-size:1.35rem;letter-spacing:.02em}
h1 .ko{color:var(--accent)}
header p{color:var(--sub);font-size:.82rem;margin-top:6px}

/* deck menu */
.deck-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.deck-btn{
  background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
  padding:16px 14px;text-align:left;cursor:pointer;transition:transform .12s,border-color .12s;
  font-family:inherit;
}
.deck-btn:hover{transform:translateY(-2px);border-color:var(--accent)}
.deck-btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.deck-btn .name{font-size:1.05rem;font-weight:700}
.deck-btn .meta{font-size:.75rem;color:var(--sub);margin-top:6px}
.deck-btn .bar{height:6px;background:var(--line);border-radius:3px;margin-top:10px;overflow:hidden}
.deck-btn .bar i{display:block;height:100%;background:var(--accent);border-radius:3px}
.deck-btn .remain{display:inline-block;margin-top:8px;font-size:.72rem;color:var(--warn);background:var(--warn-soft);padding:2px 8px;border-radius:10px}
.deck-btn .done-badge{display:inline-block;margin-top:8px;font-size:.72rem;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:10px}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin:18px 0 12px}
.toolbar button{background:none;border:none;color:var(--sub);font-size:.85rem;cursor:pointer;font-family:inherit;padding:6px}
.toolbar button:hover{color:var(--ink)}

/* study view */
.study-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.study-head .title{font-weight:700;font-size:1.05rem}
.chip{font-size:.75rem;color:var(--sub)}
.chip.review{color:var(--warn);font-weight:700}

.progress{height:6px;background:var(--line);border-radius:3px;margin-bottom:18px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--accent);transition:width .25s;border-radius:3px}

.card{
  perspective:1200px;cursor:pointer;height:290px;margin-bottom:16px;
}
.card-inner{
  position:relative;width:100%;height:100%;transition:transform .45s;
  transform-style:preserve-3d;
}
.card.flipped .card-inner{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;box-shadow:0 4px 14px rgba(34,48,62,.06);
}
.face.back{transform:rotateY(180deg);background:var(--accent-soft);border-color:var(--accent)}
.hangul{font-size:2.6rem;font-weight:800;letter-spacing:.02em;line-height:1.25;word-break:keep-all}
.kata{font-size:1.05rem;color:var(--accent);margin-top:12px;font-weight:600}
.jp{font-size:1.7rem;font-weight:700;line-height:1.4}
.jp-sub{font-size:1rem;color:var(--sub);margin-top:12px}
.hint{position:absolute;bottom:12px;font-size:.7rem;color:var(--sub)}

.grade{display:flex;gap:12px}
.grade button{
  flex:1;padding:15px 0;border-radius:var(--radius);border:none;cursor:pointer;
  font-size:1rem;font-weight:700;font-family:inherit;transition:transform .1s;
}
.grade button:active{transform:scale(.97)}
.grade .no{background:var(--warn-soft);color:var(--warn);border:1.5px solid var(--warn)}
.grade .yes{background:var(--accent);color:#fff}
.grade button:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

/* result view */
.result{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:28px 22px;text-align:center}
.result .big{font-size:1.2rem;font-weight:800;margin-bottom:8px}
.result .nums{color:var(--sub);font-size:.9rem;margin-bottom:20px}
.result .nums b.ok{color:var(--accent)}
.result .nums b.ng{color:var(--warn)}
.result-btns{display:flex;flex-direction:column;gap:10px}
.result-btns button{
  padding:13px;border-radius:14px;border:1.5px solid var(--line);background:var(--card);
  font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;
}
.result-btns .primary{background:var(--warn);border-color:var(--warn);color:#fff}
.result-btns .ghost{color:var(--sub)}
.miss-list{margin-top:20px;text-align:left;border-top:1px dashed var(--line);padding-top:14px}
.miss-list h3{font-size:.8rem;color:var(--warn);margin-bottom:8px}
.miss-list ul{list-style:none;max-height:180px;overflow-y:auto}
.miss-list li{font-size:.85rem;padding:5px 0;border-bottom:1px solid #F2EEE5;display:flex;justify-content:space-between;gap:10px}
.miss-list li .k{font-weight:700}
.miss-list li .j{color:var(--sub);text-align:right}

.prev-btn{background:none;border:1.5px dashed var(--line);border-radius:12px;padding:8px 18px;color:var(--sub);font-size:.85rem;font-family:inherit;cursor:pointer}
.prev-btn:hover:not(:disabled){color:var(--ink);border-color:var(--sub)}
.prev-btn:disabled{opacity:.35;cursor:default}
.hidden{display:none}
@media (prefers-reduced-motion: reduce){
  .card-inner{transition:none}
  .deck-btn{transition:none}
}
@media (max-width:380px){
  .hangul{font-size:2.1rem}
  .deck-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📚 <span class="ko">한국어</span> 단어 플래시카드</h1>
    <p>Lesson 1–7 ＋ Greetings｜Tap the card to flip 👆</p>
  </header>

  <!-- ===== deck menu ===== -->
  <div id="menu">
    <div class="deck-grid" id="deckGrid"></div>
    <div class="toolbar">
      <span class="chip" id="totalChip"></span>
      <button id="resetAll">Reset progress</button>
    </div>
  </div>

  <!-- ===== study ===== -->
  <div id="study" class="hidden">
    <div class="study-head">
      <button id="backBtn" style="background:none;border:none;font-size:.9rem;color:var(--sub);cursor:pointer;font-family:inherit">← Menu</button>
      <span class="title" id="deckTitle"></span>
      <span class="chip" id="modeChip"></span>
    </div>
    <div class="progress"><i id="progBar"></i></div>

    <div class="card" id="card" role="button" tabindex="0" aria-label="カードをめくる">
      <div class="card-inner">
        <div class="face front">
          <div class="hangul" id="frontMain"></div>
          <div class="kata" id="frontSub"></div>
          <div class="hint">👆 Tap to see meaning</div>
        </div>
        <div class="face back">
          <div class="jp" id="backMain"></div>
          <div class="jp-sub" id="backSub"></div>
          <div class="hint">👆 Tap to flip back</div>
        </div>
      </div>
    </div>

    <div class="grade">
      <button class="no" id="btnNo">✗ Not yet</button>
      <button class="yes" id="btnYes">✓ Got it!</button>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button id="btnPrev" class="prev-btn">↩ Previous card</button>
    </div>
  </div>

  <!-- ===== result ===== -->
  <div id="result" class="hidden">
    <div class="result">
      <div class="big" id="resTitle"></div>
      <div class="nums" id="resNums"></div>
      <div class="result-btns">
        <button class="primary hidden" id="btnReview">✗ Review missed only</button>
        <button id="btnRestart">↻ Restart all cards</button>
        <button class="ghost" id="btnMenu">← Back to menu</button>
      </div>
      <div class="miss-list hidden" id="missList">
        <h3>✗ Missed words</h3>
        <ul id="missUl"></ul>
      </div>
    </div>
  </div>
</div>

/* ---------------- STATE ---------------- */
// saved = { deckId: { missed:[indices], learned:[indices] } }
let saved = {};
let cur = null;          // {deck, queue:[idx...], pos, missed:[], learnedCount, mode}
const $ = id => document.getElementById(id);

async function loadSaved(){
  try{
    const r = await window.storage.get("kr-flashcards-v1");
    if(r && r.value) saved = JSON.parse(r.value);
  }catch(e){ saved = {}; }
}
async function persist(){
  try{ await window.storage.set("kr-flashcards-v1", JSON.stringify(saved)); }catch(e){}
}

/* ---------------- MENU ---------------- */
function renderMenu(){
  const grid = $("deckGrid");
  grid.innerHTML = "";
  let total=0;
  DECKS.forEach(d=>{
    total += d.words.length;
    const s = saved[d.id] || {missed:[],learned:[]};
    const learned = s.learned.length, missed = s.missed.length;
    const pct = Math.round(learned / d.words.length * 100);
    const btn = document.createElement("button");
    btn.className = "deck-btn";
    let badge = "";
    if(missed>0) badge = `<span class="remain review-jump">✗ Review ${missed} missed →</span>`;
    else if(learned === d.words.length) badge = `<span class="done-badge">✓ Complete!</span>`;
    btn.innerHTML = `
      <div class="name">${d.name}</div>
      <div class="meta">${d.sub} ・ ${d.words.length} words</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      ${badge}`;
    btn.addEventListener("click", (e)=>{
      if(missed>0 && e.target.classList.contains("review-jump")){
        beginSession(d, (saved[d.id].missed).slice(), "review");
      } else {
        startDeck(d, true);
      }
    });
    grid.appendChild(btn);
  });
  $("totalChip").textContent = `Total ${total} words`;
}

function startDeck(deck, forceAll){
  beginSession(deck, deck.words.map((_,i)=>i), "all");
}

function beginSession(deck, indices, mode){
  cur = { deck, queue: indices, pos: 0, missed: [], learnedCount: 0, mode, history: [] };
  $("menu").classList.add("hidden");
  $("result").classList.add("hidden");
  $("study").classList.remove("hidden");
  $("deckTitle").textContent = deck.name + (deck.id==="GR" ? "" : "");
  const chip = $("modeChip");
  chip.textContent = mode==="review" ? "Review" : "All cards";
  chip.className = "chip" + (mode==="review" ? " review" : "");
  showCard();
}

/* ---------------- CARD ---------------- */
function showCard(){
  const {deck, queue, pos} = cur;
  const w = deck.words[queue[pos]];
  const card = $("card");
  const wasFlipped = card.classList.contains("flipped");
  card.classList.remove("flipped");
  $("frontMain").textContent = w[0];
  $("frontSub").textContent = w[1];
  // 뒷면은 플립백 애니메이션이 끝난 뒤 갱신 (다음 답이 미리 보이는 것 방지)
  setTimeout(()=>{
    $("backMain").textContent = w[2];
    $("backSub").textContent = w[0] + "（" + w[1] + "）";
  }, wasFlipped ? 250 : 0);
  $("progBar").style.width = (pos / queue.length * 100) + "%";
  $("btnPrev").disabled = (pos === 0);
  $("modeChip").textContent = (cur.mode==="review"?"Review ":"") + (pos+1) + " / " + queue.length;
}

function grade(known){
  const idx = cur.queue[cur.pos];
  if(known) cur.learnedCount++;
  else cur.missed.push(idx);
  cur.history.push(known);
  cur.pos++;
  if(cur.pos >= cur.queue.length) finish();
  else showCard();
}

async function finish(){
  const d = cur.deck;
  const s = saved[d.id] || {missed:[],learned:[]};
  if(cur.mode === "all"){
    s.missed = cur.missed.slice();
    s.learned = d.words.map((_,i)=>i).filter(i=>!cur.missed.includes(i));
  } else {
    // review: 이번에 맞은 것은 missed에서 제거
    const stillMissed = cur.missed.slice();
    s.missed = stillMissed;
    s.learned = d.words.map((_,i)=>i).filter(i=>!stillMissed.includes(i));
  }
  saved[d.id] = s;
  await persist();

  $("study").classList.add("hidden");
  $("result").classList.remove("hidden");
  const ok = cur.queue.length - cur.missed.length;
  $("resTitle").textContent = cur.missed.length===0 ? "🎉 Perfect! All clear!" : "Good job! 👏";
  $("resNums").innerHTML = `${d.name}｜✓ Got it <b class="ok">${ok}</b>　✗ Not yet <b class="ng">${cur.missed.length}</b>`;

  const btnReview = $("btnReview");
  const missList = $("missList");
  if(cur.missed.length>0){
    btnReview.classList.remove("hidden");
    btnReview.textContent = `✗ Review ${cur.missed.length} missed`;
    missList.classList.remove("hidden");
    const ul = $("missUl"); ul.innerHTML = "";
    cur.missed.forEach(i=>{
      const w = d.words[i];
      const li = document.createElement("li");
      li.innerHTML = `<span class="k">${w[0]}<span style="color:var(--accent);font-weight:400;font-size:.78em"> ${w[1]}</span></span><span class="j">${w[2]}</span>`;
      ul.appendChild(li);
    });
  } else {
    btnReview.classList.add("hidden");
    missList.classList.add("hidden");
  }
}

/* ---------------- EVENTS ---------------- */
const cardEl = $("card");
cardEl.addEventListener("click", ()=> cardEl.classList.toggle("flipped"));
cardEl.addEventListener("keydown", e=>{
  if(e.key===" "||e.key==="Enter"){ e.preventDefault(); cardEl.classList.toggle("flipped"); }
});
function goBack(){
  if(!cur || cur.pos === 0) return;
  cur.pos--;
  const wasKnown = cur.history.pop();
  if(wasKnown) cur.learnedCount--;
  else cur.missed.pop();
  showCard();
}
$("btnPrev").addEventListener("click", goBack);
$("btnYes").addEventListener("click", ()=> grade(true));
$("btnNo").addEventListener("click", ()=> grade(false));
$("backBtn").addEventListener("click", ()=>{ $("study").classList.add("hidden"); renderMenu(); $("menu").classList.remove("hidden"); });
$("btnMenu").addEventListener("click", ()=>{ $("result").classList.add("hidden"); renderMenu(); $("menu").classList.remove("hidden"); });
$("btnRestart").addEventListener("click", ()=> startDeck(cur.deck, true));
$("btnReview").addEventListener("click", ()=> beginSession(cur.deck, cur.missed.slice(), "review"));
$("resetAll").addEventListener("click", async ()=>{
  const btn = $("resetAll");
  if(btn.dataset.arm !== "1"){
    btn.dataset.arm = "1";
    btn.textContent = "Really reset? Click again";
    btn.style.color = "var(--warn)";
    setTimeout(()=>{ btn.dataset.arm=""; btn.textContent="Reset progress"; btn.style.color=""; }, 3000);
    return;
  }
  saved = {}; await persist();
  btn.dataset.arm=""; btn.textContent="Reset progress"; btn.style.color="";
  renderMenu();
});

/* keyboard shortcuts: ←못외움 →외움 */
document.addEventListener("keydown", e=>{
  if($("study").classList.contains("hidden")) return;
  if(e.key==="ArrowRight") grade(true);
  if(e.key==="ArrowLeft") grade(false);
  if(e.key==="Backspace"){ e.preventDefault(); goBack(); }
});

/* ---------------- INIT ---------------- */
(async ()=>{ await loadSaved(); renderMenu(); })();
</script>
