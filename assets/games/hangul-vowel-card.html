<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 모음 매칭 게임 (음성 테스트용)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1B1F2A;
    color: #ECE6D6;
    height: 100vh;
    overflow: hidden;
  }
  #app { height: 100vh; display: flex; flex-direction: column; }
  button { font-family: inherit; border: none; cursor: pointer; }
  .screen-center {
    min-height: 100vh; width: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px; gap: 40px;
  }
  .logo-block { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .logo-box {
    width: 80px; height: 80px; border-radius: 24px; background: #ECE6D6; color: #1B1F2A;
    display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .title-stack { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .title-ko { font-size: 32px; font-weight: 900; color: #FFFFFF; letter-spacing: 0.02em; }
  .title-en { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; color: #E8B85C; opacity: 1; }
  .dots { display: flex; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #E8B85C; }
  .menu-list { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 320px; }
  .diff-btn {
    display: flex; align-items: center; justify-content: space-between;
    border-radius: 16px; padding: 20px 24px; background: #242938;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25); transition: transform 0.15s;
  }
  .diff-btn:active { transform: scale(0.95); }
  .stars { display: flex; gap: 4px; }
  .star { font-size: 18px; }
  .count { font-size: 24px; font-weight: 600; color: #ECE6D6; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 480px; margin: 0 auto; padding: 14px 16px 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%; background: #242938;
    display: flex; align-items: center; justify-content: center; font-size: 16px; color: #ECE6D6;
  }
  .stats { display: flex; gap: 16px; font-size: 14px; font-weight: 500; }
  .stats .time { color: #E8B85C; }
  .board-wrap { flex: 1; overflow-y: auto; padding: 4px 16px 0; }
  .board {
    display: grid; gap: 8px; width: 100%; max-width: 480px; margin: 0 auto; padding-bottom: 8px;
  }
  .card {
    aspect-ratio: 1/1; border-radius: 16px; display: flex; align-items: center; justify-content: center;
    position: relative; transition: transform 0.15s, background 0.2s, opacity 0.2s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.25);
  }
  .card:active { transform: scale(0.95); }
  .card .sym { font-size: 28px; font-weight: bold; }
  .card .dot-hidden { width: 10px; height: 10px; border-radius: 50%; background: #E8B85C; opacity: 0.4; }
  .vol-icon { position: absolute; bottom: 6px; right: 6px; font-size: 10px; opacity: 0.6; }

  .collection-box {
    width: 100%; max-width: 480px; margin: 8px auto 0; border-radius: 20px;
    padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 8px;
    background: #2A2129; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    border: 2px solid rgba(255,133,162,0.2);
  }
  .collection-title { display: flex; align-items: center; gap: 8px; padding: 0 4px; }
  .collection-title .line { flex: 1; height: 1px; background: #ECE6D6; opacity: 0.2; }
  .collection-title span { font-size: 12px; font-weight: bold; letter-spacing: 0.05em; color: #ECE6D6; opacity: 0.8; }
  .chips-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .empty-hint { display: flex; align-items: center; gap: 8px; opacity: 0.6; font-size: 11px; color: #D9D2BC; padding: 2px 0; }
  .chip-wrap { position: relative; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; }
  .chip {
    width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 17px; color: #1B1F2A; border: 3px solid white; position: relative; z-index: 10;
    animation: popInCute 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 6px 10px rgba(0,0,0,0.3);
    text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
  }
  .spark {
    position: absolute; top: 50%; left: 50%; width: 9px; height: 9px; border-radius: 9999px;
    animation: sparkBurst 0.9s ease-out forwards; pointer-events: none; z-index: 20;
    box-shadow: 0 0 6px 2px rgba(255,255,255,0.7);
  }
  .chip-wrap { overflow: visible; }
  @keyframes popInCute {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
    80% { transform: scale(0.9) rotate(-5deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes neonGlow {
    0%, 100% { box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 18px #FF85A2, 0 0 32px #FF85A2; }
    50% { box-shadow: 0 0 2px #fff, 0 0 4px #fff, 0 0 9px #FF85A2, 0 0 16px #FF85A2; }
  }
  @keyframes sparkBurst {
    0% { transform: translate(-50%, -50%) translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }
  .complete-screen { gap: 32px; }
  .complete-stars { display: flex; gap: 8px; font-size: 36px; }
  .complete-stats { display: flex; gap: 32px; text-align: center; }
  .complete-stats .num { font-size: 32px; font-weight: bold; }
  .complete-stats .lbl { font-size: 11px; opacity: 0.6; margin-top: 4px; }
  .complete-actions { display: flex; gap: 16px; }
  .round-btn {
    width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 6px 16px rgba(0,0,0,0.3);
  }
  .sparkle-big { font-size: 48px; }
</style>
</head>

/* ============ 유틸 ============ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildDeck(set) {
  const pairs = set.flatMap((item, i) => [
    { uid: `${i}-a`, key: i, ...item },
    { uid: `${i}-b`, key: i, ...item },
  ]);
  return shuffle(pairs).map((c) => ({ ...c, flipped: false, matched: false }));
}
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, "0")}`;
}
let cachedKoVoice = null;
function pickKoreanVoice() {
  if (cachedKoVoice) return cachedKoVoice;
  if (!("speechSynthesis" in window)) return null;
  const voices = window.speechSynthesis.getVoices().filter((v) => v.lang && v.lang.startsWith("ko"));
  if (!voices.length) return null;
  const ranked = [...voices].sort((a, b) => Number(a.localService) - Number(b.localService));
  cachedKoVoice = ranked[0];
  return cachedKoVoice;
}
function speak(text) {
  try {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const voice = pickKoreanVoice();
    if (voice) u.voice = voice;
    u.lang = "ko-KR"; u.rate = 0.9; u.pitch = 1.1;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}
function playAudio(audioChar) {
  const report = (msg) => { window.__lastAudioSource = msg; updateDebugBadge(); };
  try {
    const dataUrl = AUDIO_MAP[audioChar];
    if (dataUrl) {
      const audio = new Audio(dataUrl);
      audio.onerror = () => {
        const code = audio.error ? audio.error.code : "?";
        const msg = audio.error ? audio.error.message : "no message";
        report(`TTS (decode error ${code}: ${msg})`);
        speak(audioChar);
      };
      audio.play().then(() => {
        report("🎤 RECORDED VOICE");
      }).catch((err) => {
        report(`TTS (play() rejected: ${err && err.name ? err.name : err})`);
        speak(audioChar);
      });
    } else {
      report("TTS (no entry in AUDIO_MAP)");
      speak(audioChar);
    }
  } catch (e) {
    report(`TTS (exception: ${e && e.message ? e.message : e})`);
    speak(audioChar);
  }
}
function updateDebugBadge() {
  const el = document.getElementById("debug-badge");
  if (el) el.textContent = window.__lastAudioSource || "";
}

/* ============ 상태 ============ */
let state = {
  screen: "menu", difficulty: null, deck: [], activeFlips: [], moves: 0,
  seconds: 0, locked: false, collected: [], timerId: null,
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function startGame(diff) {
  if (state.timerId) clearInterval(state.timerId);
  const deck = buildDeck(DIFFICULTIES[diff].set);
  state = { screen: "playing", difficulty: diff, deck, activeFlips: [], moves: 0, seconds: 0, locked: false, collected: [], timerId: null };
  state.timerId = setInterval(() => {
    state.seconds += 1;
    const el = document.getElementById("time-display");
    if (el) { el.textContent = formatTime(state.seconds); }
    else { render(); }
  }, 1000);
  render();
}

function updateCardDOM(uid) {
  const card = state.deck.find((c) => c.uid === uid);
  const btn = document.querySelector(`.card[data-uid="${uid}"]`);
  if (!btn || !card) return;
  const shown = card.flipped || card.matched;
  btn.style.background = card.matched ? "#3FA796" : shown ? "#ECE6D6" : "#242938";
  btn.style.opacity = card.matched ? "0.5" : "1";
  if (card.matched) btn.setAttribute("disabled", "true");
  btn.innerHTML = shown
    ? `<span class="sym" style="color:#1B1F2A">${card.sym}</span>`
    : `<span class="dot-hidden"></span>`;
  if (card.matched) btn.insertAdjacentHTML("beforeend", `<span class="vol-icon">🔊</span>`);
}
function updateMovesDOM() {
  const el = document.getElementById("moves-display");
  if (el) el.textContent = `${state.moves} moves`;
}
function appendNewChip(index) {
  const container = document.getElementById("chips-row");
  if (!container) return;
  const hint = container.querySelector(".empty-hint");
  if (hint) hint.remove();
  const sym = state.collected[index];
  const sparks = SPARK_OFFSETS.map(([tx, ty], j) =>
    `<span class="spark" style="background:${SPARK_COLORS[j % SPARK_COLORS.length]};--tx:${tx}px;--ty:${ty}px"></span>`
  ).join("");
  container.insertAdjacentHTML(
    "beforeend",
    `<div class="chip-wrap">${sparks}<div class="chip" style="background:${CHIP_COLORS[index % CHIP_COLORS.length]}">${sym}</div></div>`
  );
}

function handleFlip(uid) {
  if (state.locked) return;
  const card = state.deck.find((c) => c.uid === uid);
  if (!card || card.flipped || card.matched) return;

  window.__lastAudioSource = "...";
  playAudio(card.audio);

  card.flipped = true;
  state.activeFlips.push(uid);
  updateCardDOM(uid);

  if (state.activeFlips.length === 2) {
    state.locked = true;
    state.moves += 1;
    updateMovesDOM();
    const [a, b] = state.activeFlips;
    const cardA = state.deck.find((c) => c.uid === a);
    const cardB = state.deck.find((c) => c.uid === b);
    const isMatch = cardA.key === cardB.key;

    setTimeout(() => {
      if (isMatch) {
        cardA.matched = true; cardB.matched = true;
        state.collected.push(cardA.sym);
        updateCardDOM(a); updateCardDOM(b);
        appendNewChip(state.collected.length - 1);
      } else {
        cardA.flipped = false; cardB.flipped = false;
        updateCardDOM(a); updateCardDOM(b);
      }
      state.activeFlips = [];
      state.locked = false;

      const total = DIFFICULTIES[state.difficulty].set.length;
      const matched = state.deck.filter((c) => c.matched).length / 2;
      if (matched === total) {
        clearInterval(state.timerId);
        setTimeout(() => setState({ screen: "complete" }), 500);
      }
    }, isMatch ? 450 : 800);
  }
}

/* ============ 렌더 ============ */
function render(skipFull) {
  const app = document.getElementById("app");
  if (state.screen === "menu") {
    app.innerHTML = renderMenu();
    attachMenuEvents();
  } else if (state.screen === "playing") {
    app.innerHTML = renderPlaying();
    attachPlayingEvents();
  } else if (state.screen === "complete") {
    app.innerHTML = renderComplete();
    attachCompleteEvents();
  }
}

function renderMenu() {
  const items = Object.entries(DIFFICULTIES).map(([key, val]) => {
    const stars = Array.from({length:3}, (_,i) => `<span class="star">${i < val.stars ? "⭐" : "☆"}</span>`).join("");
    return `<button class="diff-btn" data-diff="${key}">
      <span class="stars">${stars}</span>
      <span class="count">${val.set.length}</span>
    </button>`;
  }).join("");
  return `<div class="screen-center">
    <div class="logo-block">
      <div class="title-stack">
        <span class="title-ko">한글모음</span>
        <span class="title-en">HANGUL VOWELS</span>
      </div>
      <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
    <div class="menu-list">${items}</div>
  </div>`;
}
function attachMenuEvents() {
  document.querySelectorAll(".diff-btn").forEach((btn) => {
    btn.addEventListener("click", () => startGame(btn.dataset.diff));
  });
}

function renderPlaying() {
  const cols = DIFFICULTIES[state.difficulty].cols;
  const cards = state.deck.map((card) => {
    const shown = card.flipped || card.matched;
    const bg = card.matched ? "#3FA796" : shown ? "#ECE6D6" : "#242938";
    const color = card.matched ? "#1B1F2A" : "#1B1F2A";
    const opacity = card.matched ? "0.5" : "1";
    const inner = shown
      ? `<span class="sym" style="color:${color}">${card.sym}</span>`
      : `<span class="dot-hidden"></span>`;
    const vol = card.matched ? `<span class="vol-icon">🔊</span>` : "";
    return `<button class="card" data-uid="${card.uid}" style="background:${bg};opacity:${opacity}" ${card.matched ? "disabled" : ""}>${inner}${vol}</button>`;
  }).join("");

  const chips = state.collected.map((sym, i) => {
    const sparks = SPARK_OFFSETS.map(([tx,ty], j) =>
      `<span class="spark" style="background:${SPARK_COLORS[j % SPARK_COLORS.length]};--tx:${tx}px;--ty:${ty}px"></span>`
    ).join("");
    return `<div class="chip-wrap">${sparks}<div class="chip" style="background:${CHIP_COLORS[i % CHIP_COLORS.length]}">${sym}</div></div>`;
  }).join("");
  const emptyHint = state.collected.length === 0
    ? `<div class="empty-hint">✨ Match a pair to collect a cute vowel chip!</div>` : "";

  return `
    <div class="header">
      <button class="icon-btn" id="back-btn">←</button>
      <div class="stats">
        <span id="moves-display">${state.moves} moves</span>
        <span class="time" id="time-display">${formatTime(state.seconds)}</span>
      </div>
    </div>
    <div style="text-align:center;font-size:10px;opacity:0.5;min-height:14px" id="debug-badge"></div>
    <div class="board-wrap">
      <div class="board" style="grid-template-columns:repeat(${cols},1fr)">${cards}</div>
      <div class="collection-box">
        <div class="collection-title">
          <span>❤️ My Vowel Box</span>
          <div class="line"></div>
        </div>
        <div class="chips-row" id="chips-row">${emptyHint}${chips}</div>
      </div>
    </div>
  `;
}
function attachPlayingEvents() {
  document.getElementById("back-btn").addEventListener("click", () => {
    if (state.timerId) clearInterval(state.timerId);
    setState({ screen: "menu" });
  });
  document.querySelectorAll(".card").forEach((btn) => {
    btn.addEventListener("click", () => handleFlip(btn.dataset.uid));
  });
  updateDebugBadge();
}

function renderComplete() {
  const total = DIFFICULTIES[state.difficulty].set.length;
  const ideal = total;
  let earned = 1;
  if (state.moves <= ideal * 1.3) earned = 3;
  else if (state.moves <= ideal * 1.8) earned = 2;
  const stars = Array.from({length:3}, (_,i) => i < earned ? "⭐" : "☆").join("");
  return `<div class="screen-center complete-screen">
    <div class="sparkle-big">✨</div>
    <div class="complete-stars">${stars}</div>
    <div class="complete-stats">
      <div><div class="num">${state.moves}</div><div class="lbl">moves</div></div>
      <div><div class="num">${formatTime(state.seconds)}</div><div class="lbl">time</div></div>
    </div>
    <div class="complete-actions">
      <button class="round-btn" id="menu-btn" style="background:#242938">←</button>
      <button class="round-btn" id="retry-btn" style="background:#3FA796">↻</button>
    </div>
  </div>`;
}
function attachCompleteEvents() {
  document.getElementById("menu-btn").addEventListener("click", () => setState({ screen: "menu" }));
  document.getElementById("retry-btn").addEventListener("click", () => startGame(state.difficulty));
}

/* ============ 초기 실행 ============ */
if ("speechSynthesis" in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener("voiceschanged", () => { cachedKoVoice = null; });
}

let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try {
    const silence = new Audio("data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjIwLjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIADAwMDAwMDAwMDAwMDAwMDAwMDAwMDV1dXV1dXV1dXV1dXV1dXV1dXV1dXV6urq6urq6urq6urq6urq6urq6urq6v////////////////////////////////8AAAAATGF2YzU4LjM1AAAAAAAAAAAAAAAAJAAAAAAAAAAAASDs90hvAAAAAAAAAAAAAAAAAAAA");
    silence.play().catch(() => {});
  } catch(e) {}
}
document.addEventListener("touchstart", unlockAudio, { once: true });
document.addEventListener("click", unlockAudio, { once: true });

render();
</script>
</body>
