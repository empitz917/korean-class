<!DOCTYPE html>
<!-- v2 -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한글모음 슈팅게임 | Hangul Vowel Shooting Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap');

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; touch-action: none;
    background: #07304a;
    font-family: 'Noto Sans KR', sans-serif;
  }
  #stage {
    position: fixed;
    top: 0; left: 0; right: 0;
    bottom: 0;
    bottom: env(safe-area-inset-bottom, 0px);
  }
  canvas { display: block; width: 100%; height: 100%; }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 10px 14px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    pointer-events: none;
    z-index: 5;
  }
  #title {
    font-family: 'Noto Sans KR', sans-serif;
    color: #FFE9A8;
    font-size: clamp(14px, 3.2vw, 20px);
    text-shadow: 0 2px 0 rgba(0,0,0,.35);
    letter-spacing: 1px;
    text-align: center;
  }
  #lives {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5px;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,.4));
  }
  .heartSlot {
    position: relative;
    display: inline-block;
    width: 20px; height: 20px;
    font-size: 18px;
    line-height: 20px;
    flex-shrink: 0;
  }
  .heartSlot .heartBg, .heartSlot .heartFg {
    position: absolute; left: 0; top: 0;
    width: 100%; height: 100%;
    text-align: left;
  }
  .heartSlot .heartFg { width: 50%; overflow: hidden; }
  #progress {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
    max-width: 95vw;
  }
  .dot {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; color: #fff;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    transition: all .25s ease;
  }
  .dot.done { background: #FFD23F; color: #07304a; border-color: #FFD23F; transform: scale(1.05); }
  .dot.current { background: #FF6B5C; border-color: #FF6B5C; transform: scale(1.15); }

  #targetLabel {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(12px, 2.6vw, 15px);
    color: #fff;
    background: rgba(0,0,0,0.25);
    padding: 4px 12px;
    border-radius: 16px;
    text-align: center;
  }
  #targetLabel b { color: #FFD23F; font-size: 1.2em; margin: 0 3px; }

  #combineOverlay, #missionOverlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity .25s ease;
    z-index: 6;
  }
  #combineOverlay.show, #missionOverlay.show { opacity: 1; }
  #combineText {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(70px, 22vw, 180px);
    color: #fff;
    text-shadow: 0 0 30px #FFD23F, 0 0 60px #FF6B5C, 0 4px 0 rgba(0,0,0,.4);
  }
  #missionBadge {
    background: rgba(7,48,74,0.94);
    border: 4px solid #FFD23F;
    border-radius: 28px;
    padding: 18px 40px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
  }
  #missionTag {
    font-family: 'Noto Sans KR', sans-serif;
    color: #FFD23F;
    font-size: 13px;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  #missionText {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(56px, 17vw, 120px);
    color: #fff;
    text-shadow: 0 0 24px #FFD23F;
  }

  .modal {
    position: fixed; inset: 0;
    background: rgba(4,20,32,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 20; text-align: center; padding: 24px;
  }
  .modal.hidden { display: none; }
  #endModal { background: rgba(4,20,32,0.45); }
  .modalBox { max-width: 430px; }
  .modalBox h1 {
    font-family: 'Noto Sans KR', sans-serif;
    color: #FFD23F;
    font-size: clamp(26px, 6.5vw, 40px);
    margin: 0 0 14px;
    text-shadow: 0 3px 0 rgba(0,0,0,.4);
  }
  .modalBox h1 .enLine {
    display: block;
    font-size: clamp(13px, 3.4vw, 18px);
    color: #FFE9A8;
    white-space: nowrap;
    margin-top: 6px;
    letter-spacing: 0.2px;
  }
  .modalBox p {
    color: #fff; font-size: 15.5px; line-height: 1.7; margin: 0 0 22px;
    opacity: .92;
  }
  .modalBox p b { color: #FF9D8A; }
  .modalBox button {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px; color: #07304a;
    background: linear-gradient(180deg, #FFE08A, #FFD23F);
    border: none; border-radius: 30px;
    padding: 14px 38px;
    box-shadow: 0 6px 0 #c79a1f, 0 8px 14px rgba(0,0,0,.35);
    cursor: pointer;
    transition: transform .08s;
  }
  .modalBox button:active { transform: translateY(4px); box-shadow: 0 2px 0 #c79a1f; }

  #wallDemoFrame {
    width: 260px; height: 210px;
    margin: 8px auto 20px;
    border-radius: 16px;
    border: 3px solid rgba(255,210,63,0.55);
    overflow: hidden;
    box-shadow: 0 10px 26px rgba(0,0,0,.45);
  }
  #wallDemoCanvas { display: block; width: 100%; height: 100%; }

  #hint {
    position: fixed; bottom: 14px; left: 0; right: 0;
    text-align: center; color: rgba(255,255,255,.65);
    font-size: 13px; pointer-events: none; z-index: 4;
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="c"></canvas>
</div>

<div id="topbar">
  <div id="title">한글모음 슈팅게임<br>Hangul Vowel Shooting Game</div>
  <div id="lives">❤️❤️❤️</div>
  <div id="progress"></div>
  <div id="targetLabel"></div>
</div>

<div id="missionOverlay">
  <div id="missionBadge">
    <div id="missionTag">MISSION</div>
    <div id="missionText"></div>
  </div>
</div>

<div id="combineOverlay"><div id="combineText"></div></div>

<div id="hint"></div>

<div class="modal" id="startModal">
  <div class="modalBox">
    <h1>한글모음 슈팅게임<span class="enLine">Hangul Vowel Shooting Game</span></h1>
    <button id="startBtn">시작하기 · Start</button>
  </div>
</div>

<div class="modal hidden" id="wallTutorial">
  <div class="modalBox">
    <div id="wallDemoFrame">
      <canvas id="wallDemoCanvas" width="260" height="210"></canvas>
    </div>
    <button id="wallTutorialBtn">✓</button>
  </div>
</div>

<div class="modal hidden" id="endModal">
  <div class="modalBox">
    <h1>🎉</h1>
    <p style="font-size:3em;margin:0.1em 0;">21 ✅</p>
    <button id="restartBtn" title="Play again" style="font-size:2em;padding:0.4em 0.8em;">🔄</button>
  </div>
</div>

<div class="modal hidden" id="gameOverModal">
  <div class="modalBox">
    <h1>💔</h1>
    <button id="retryBtn" title="Try again" style="font-size:2em;padding:0.4em 0.8em;">🔄</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- 모음 데이터 (유니코드 중성 순서, ㅇ=초성 11) ----------
  const VOWELS = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  function composeSyllable(vowelIdx){
    const CHO = 11; // ㅇ
    return String.fromCharCode(0xAC00 + (CHO*21 + vowelIdx)*28);
  }
  // 모음 21개의 합치기 방향을 인덱스 순서대로 명시한 표
  // 아 애 야 얘 어 에 여 예 오 와 왜 외 요 우 워 웨 위 유 으 의 이
  // h = 가로형(ㅇ 왼쪽 → 모음 오른쪽) / v = 세로형(ㅇ 위 → 모음 아래) / o = 겹쳐서 완성(복합모음)
  const VOWEL_ORIENTATION = ['h','h','h','h','h','h','h','h','v','o','o','o','v','v','o','o','o','v','v','o','h'];
  // 와(9) 왜(10) 외(11) 워(14) 웨(15) 위(16) 의(19) → 'o' (ㅇ과 모음이 겹쳐지며 완성)
  // 오(8) 요(12) 우(13) 유(17) 으(18) → 'v' (ㅇ 위, 모음 아래)
  // 나머지 → 'h' (ㅇ 왼쪽, 모음 오른쪽)

  const CONFUSION_GROUPS = [
    [0,4], [1,5,3,7], [2,6], [8,13], [12,17], [9,10,11], [14,15,16], [18,19,20]
  ];
  function getGroupFor(idx){
    for(const g of CONFUSION_GROUPS) if(g.indexOf(idx) !== -1) return g;
    return [idx];
  }
  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      const tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
    }
    return arr;
  }
  function rand(a,b){ return a + Math.random()*(b-a); }

  // ---------- DOM ----------
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const progressEl = document.getElementById('progress');
  const targetLabelEl = document.getElementById('targetLabel');
  const livesEl = document.getElementById('lives');
  const combineOverlay = document.getElementById('combineOverlay');
  const combineText = document.getElementById('combineText');
  const missionOverlay = document.getElementById('missionOverlay');
  const missionText = document.getElementById('missionText');
  const startModal = document.getElementById('startModal');
  const endModal = document.getElementById('endModal');
  const gameOverModal = document.getElementById('gameOverModal');

  let W=0,H=0,DPR=1;
  let dangerY = 0;
  const launcher = { x:0, y:0 };

  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*DPR; canvas.height = H*DPR;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    launcher.x = W/2; launcher.y = H - 70;
    dangerY = H - 140;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- 진행도 UI ----------
  function buildProgress(){
    progressEl.innerHTML = '';
    for(let i=0;i<VOWELS.length;i++){
      const d = document.createElement('div');
      d.className = 'dot';
      d.textContent = VOWELS[i];
      d.id = 'dot'+i;
      progressEl.appendChild(d);
    }
  }
  function refreshProgress(){
    for(let i=0;i<VOWELS.length;i++){
      const d = document.getElementById('dot'+i);
      d.classList.remove('done','current');
      if(i < vowelIndex) d.classList.add('done');
      else if(i === vowelIndex) d.classList.add('current');
    }
  }
  function refreshLives(){
    let html = '';
    for(let i=0;i<MAX_LIVES;i++){
      const remaining = Math.max(0, Math.min(2, lifeUnits - i*2));
      if(remaining >= 2){
        html += '<span class="heartSlot"><span class="heartBg">❤️</span></span>';
      } else if(remaining === 1){
        html += '<span class="heartSlot"><span class="heartBg">🖤</span><span class="heartFg">❤️</span></span>';
      } else {
        html += '<span class="heartSlot"><span class="heartBg">🖤</span></span>';
      }
    }
    livesEl.innerHTML = html;
  }

  // ---------- 음성 ----------
  let koVoice = null;
  function pickVoice(){
    const voices = speechSynthesis.getVoices();
    koVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ko')) || null;
  }
  if('speechSynthesis' in window){
    pickVoice();
    speechSynthesis.onvoiceschanged = pickVoice;
  }
  function speak(text){
    if(!('speechSynthesis' in window)) return;
    try{
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR';
      if(koVoice) u.voice = koVoice;
      u.rate = 0.85;
      u.pitch = 1.05;
      speechSynthesis.speak(u);
    }catch(e){}
  }

  let audioCtx = null;
  let SYLLABLE_BUFFERS = {};
  function base64ToArrayBuffer(base64){
    const binary = atob(base64);
    const len = binary.length;
    const bytes = new Uint8Array(len);
    for(let i=0;i<len;i++) bytes[i] = binary.charCodeAt(i);
    return bytes.buffer;
  }
  let _audioUnlocked = false;
  function unlockAudio(){
    if(_audioUnlocked) return;
    _audioUnlocked = true;
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      // 무음 버퍼를 실제로 재생해서 컨텍스트 잠금 해제 (iOS Safari 필수)
      audioCtx.resume().then(function(){
        const buf = audioCtx.createBuffer(1, 1, 22050);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(audioCtx.destination);
        src.start(0);
      }).catch(function(){});
    }catch(e){}
  }

  function _playBuffer(buf){
    try{
      const g   = audioCtx.createGain();
      const now = audioCtx.currentTime;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(1, now + 0.005);
      const end = now + buf.duration;
      g.gain.setValueAtTime(1, Math.max(now + 0.01, end - 0.03));
      g.gain.linearRampToValueAtTime(0, end);
      g.connect(audioCtx.destination);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(g);
      src.start(now);
    }catch(e){}
  }

  function _decodeAndPlay(idx){
    try{
      // 이미 디코딩된 버퍼가 있으면 바로 재생
      if(SYLLABLE_BUFFERS[idx]){ _playBuffer(SYLLABLE_BUFFERS[idx]); return; }
      const dataUri = SYLLABLE_AUDIO[idx];
      if(!dataUri){ try{ speak(composeSyllable(idx)); }catch(e){} return; }
      const commaIdx = dataUri.indexOf(',');
      const b64 = dataUri.slice(commaIdx+1);
      const arrBuf = base64ToArrayBuffer(b64);
      audioCtx.decodeAudioData(arrBuf,
        function(buf){ SYLLABLE_BUFFERS[idx] = buf; _playBuffer(buf); },
        function(){ try{ speak(composeSyllable(idx)); }catch(e){} }
      );
    }catch(e){ try{ speak(composeSyllable(idx)); }catch(e2){} }
  }

  // ---------- 선생님이 녹음한 모음 21개 발음 (완성 글자 발음용) ----------
  function pop(freq){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.value = 0.18;
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.25);
      o.stop(audioCtx.currentTime+0.27);
    }catch(e){}
  }
  function unlockAudio(){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      if(audioCtx.state === 'suspended') audioCtx.resume();
      decodeAllSyllableAudio();
    }catch(e){}
    try{
      if('speechSynthesis' in window){
        const u = new SpeechSynthesisUtterance(' ');
        u.lang = 'ko-KR';
        u.volume = 0.01;
        speechSynthesis.speak(u);
      }
    }catch(e){}
    try{
      // 실제 들리는 소리로 아주 짧게 한 번 재생해서 이후 자동 재생 제한을 확실히 풀어준다
      // (volume=0이나 muted 재생은 일부 브라우저에서 "진짜 재생"으로 인정되지 않아 잠금이 안 풀림)
      const a = new Audio(SYLLABLE_AUDIO[0]);
      a.volume = 1;
      const p = a.play();
      if(p && p.then){
        p.then(function(){
          setTimeout(function(){ try{ a.pause(); a.currentTime = 0; }catch(e){} }, 90);
        }).catch(function(){});
      }
    }catch(e){}
  }

  function startBufferSource(buf){ _playBuffer(buf); } // 하위 호환

  function playSyllableAudio(idx){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      if(audioCtx.state === 'suspended'){
        // resume() 완료 후에 재생 — suspended 상태에서 start()하면 묵음
        audioCtx.resume().then(function(){ _decodeAndPlay(idx); }).catch(function(){
          try{ speak(composeSyllable(idx)); }catch(e){}
        });
      } else {
        _decodeAndPlay(idx);
      }
    }catch(e){
      try{ speak(composeSyllable(idx)); }catch(e2){}
    }
  }

  // ---------- 게임 상태 ----------
  let vowelIndex = 0;
  let phase = 'idle'; // idle | announcing | field | combining | done | gameover
  let running = false;

  const MAX_LIVES = 5;
  const MAX_LIFE_UNITS = MAX_LIVES * 2; // 하트 1개 = 2유닛(반쪽씩)
  const BASE_FIELD_SPEED = 0.012; // 풍선 더미가 내려오는 기본 속도(px/ms) - 쉬운 난이도
  let lifeUnits = MAX_LIFE_UNITS;
  let fieldSpeed = BASE_FIELD_SPEED;
  let fieldDescent = 0;
  let fieldGrace = 0; // 풍선 더미를 새로 만든 직후 잠깐은 위험선 체크를 건너뜀(연쇄 트리거 방지)
  let dangerFlash = 0;

  let fieldBubbles = [];
  let gotO = false, gotVowel = false;
  let heartPity = 0;
  let bg = [];
  let particles = [];
  let fireworks = [];
  let fireworkTimer = 0;
  let arrow = null;
  let mergeAnim = null;

  // ---------- 배경의 아주 약한 장식 거품(클릭 불가, 분위기용) ----------
  function spawnBg(){
    bg = [];
    for(let i=0;i<10;i++){
      bg.push({ x: rand(0,W), y: rand(0,H), r: rand(2,5), spd: rand(6,16), phase: rand(0,Math.PI*2) });
    }
  }

  // ---------- 풍선 더미 생성 ----------
  function spawnField(){
    fieldDescent = 0;
    fieldGrace = 500; // 새 더미가 나온 직후 0.5초는 위험선에 안 걸리도록 보호
    fieldBubbles = [];
    const cols = W < 480 ? 5 : 6;
    const marginX = W*0.09;
    const usableW = W - marginX*2 - (W/cols)/2; // 지그재그 배치 여유
    const slotW = usableW / (cols-0.5);
    let r = Math.max(24, Math.min(38, slotW*0.42));
    let rowH = r*2.15;
    const startY = 96;

    // 화면이 짧아도 풍선 더미가 처음부터 위험선에 닿지 않도록 줄 수를 화면 높이에 맞춰 동적으로 계산
    // (예전에는 최소 2줄을 강제해서, 화면이 매우 짧으면 시작부터 위험선과 겹치는 버그가 있었음)
    let availableH = dangerY - startY - 30;
    let rows = Math.min(4, Math.floor(availableH / rowH));
    if(rows < 1){
      // 한 줄조차 들어갈 공간이 없을 만큼 화면이 짧다면, 풍선 크기 자체를 줄여서 반드시 맞춘다
      r = Math.max(14, Math.min(r, availableH / 2.3));
      rowH = r*2.15;
      rows = 1;
    }

    const targetIdx = vowelIndex;
    const group = getGroupFor(targetIdx).filter(function(i){ return i!==targetIdx; });
    const totalSlots = rows*cols;
    const oCount = Math.max(3, Math.round(totalSlots*0.2));

    // 정답 모음은 항상 "위쪽 절반" 줄에만 나오게 고정한다 (뒤쪽/아래쪽에 배치돼서
    // 반응할 시간이 부족해지는 문제를 해결 — 하강 속도는 그대로 둔다)
    // 정답 풍선은 1개가 아니라 2개를 넣어서 맞힐 기회를 늘린다.
    const topRows = Math.max(1, Math.ceil(rows/2));
    const targetCells = [];
    {
      const topSlots = [];
      for(let rr=0; rr<topRows; rr++){
        for(let cc=0; cc<cols; cc++) topSlots.push({row:rr, col:cc});
      }
      shuffle(topSlots);
      const targetCount = Math.min(5, topSlots.length);
      for(let i=0;i<targetCount;i++) targetCells.push(topSlots[i]);
    }
    function isTargetCellAt(row,col){
      return targetCells.some(function(c){ return c.row===row && c.col===col; });
    }

    // 하트 보너스는 매번 무조건 등장하며, 맨 아랫줄의 가장자리가 아닌 안쪽 칸에 배치한다.
    let heartCell = null;
    if(cols >= 3){
      const safeColMin = 1, safeColMax = cols - 2;
      const hrow = rows - 1; // 하트는 항상 맨 아랫줄에 배치
      let hcol, tries = 0;
      do {
        hcol = safeColMin + Math.floor(Math.random()*(safeColMax-safeColMin+1));
        tries++;
      } while(isTargetCellAt(hrow,hcol) && tries<10);
      heartCell = { row: hrow, col: hcol };
    }

    const poolSize = totalSlots - targetCells.length - (heartCell ? 1 : 0); // 정답 칸(+하트 칸)은 풀에서 제외
    let pool = [];
    for(let i=0;i<oCount;i++) pool.push({type:'o'});
    for(const gi of group) pool.push({type:'v', idx: gi}); // 헷갈리는 모음들
    while(pool.length < poolSize){
      const r2 = Math.floor(Math.random()*VOWELS.length);
      pool.push({type:'v', idx:r2});
    }
    pool = shuffle(pool.slice(0, poolSize));

    let p = 0;
    for(let row=0; row<rows; row++){
      const offset = (row % 2 === 1) ? slotW/2 : 0;
      for(let col=0; col<cols; col++){
        const bx = marginX + offset + col*slotW + slotW/2 + rand(-3,3);
        const by = startY + row*rowH;
        const isTargetCell = isTargetCellAt(row,col);
        const isHeartCell = heartCell && heartCell.row===row && heartCell.col===col;
        const item = isTargetCell ? {type:'v', idx:targetIdx} : (isHeartCell ? {type:'heart'} : pool[p++]);
        if(item.type === 'o'){
          fieldBubbles.push({
            bx, by, r, type:'o',
            label:'ㅇ', isO:true, isTarget:false,
            color:'#FF6B5C', glow:'rgba(255,107,92,0.5)',
            wobbleSeed: rand(0,Math.PI*2), wobbleAmp: rand(2,5)
          });
        } else if(item.type === 'heart'){
          fieldBubbles.push({
            bx, by, r, type:'heart',
            hitsTaken: 0,
            wobbleSeed: rand(0,Math.PI*2), wobbleAmp: rand(2,5)
          });
        } else {
          fieldBubbles.push({
            bx, by, r, type:'v',
            label: VOWELS[item.idx], isO:false, isTarget: item.idx===targetIdx,
            color:'#FFD23F', glow:'rgba(255,210,63,0.5)',
            wobbleSeed: rand(0,Math.PI*2), wobbleAmp: rand(2,5)
          });
        }
      }
    }
  }

  function showMission(){
    const syll = composeSyllable(vowelIndex);
    missionText.textContent = syll;
    missionOverlay.classList.add('show');
    targetLabelEl.innerHTML = '';
    refreshProgress();
    setTimeout(function(){
      missionOverlay.classList.remove('show');
      phase = 'field';
      spawnField();
      targetLabelEl.innerHTML = '';
    }, 1400);
  }

  function startRound(){
    phase = 'announcing';
    gotO = false; gotVowel = false;
    fieldBubbles = [];
    showMission();
  }

  // ---------- 풍선 명중 처리 ----------
  function removeFromField(b){
    const i = fieldBubbles.indexOf(b);
    if(i !== -1) fieldBubbles.splice(i,1);
  }

  function onFieldBubbleHit(b){
    if(b.type === 'heart'){
      b.hitsTaken = (b.hitsTaken||0) + 1;
      if(b.hitsTaken >= 2){
        removeFromField(b);
        pop(950);
        burst(b.x, b.y, '#FF4D6D');
        lifeUnits = Math.min(lifeUnits+2, MAX_LIFE_UNITS);
        refreshLives();
      } else {
        pop(600);
        burst(b.x, b.y, '#FFB3C6');
      }
      return; // 하트 풍선은 미션 진행과 무관
    }
    removeFromField(b);
    if(b.isTarget && !gotO){
      // ㅇ을 먼저 맞히지 않고 정답 모음을 먼저 맞힌 경우 -> 순서가 틀려서 오답 처리
      // (이 풍선은 사라지고 목숨이 줄어요. 다음 풍선 더미에 정답 모음이 다시 보장되어 등장함)
      pop(150);
      burst(b.x, b.y, '#FF5C5C');
      loseLife();
      return;
    }
    if(b.isO){
      pop(520);
      burst(b.x, b.y, b.color);
      gotO = true;
    } else if(b.isTarget){
      pop(780);
      burst(b.x, b.y, b.color);
      gotVowel = true;
    } else {
      pop(150);
      burst(b.x, b.y, '#FF5C5C');
      loseLife();
    }
    checkMissionComplete();
  }

  function checkMissionComplete(){
    if(gotO && gotVowel && phase === 'field'){
      const vChar = VOWELS[vowelIndex];
      // 남은 풍선들 화면 정리
      for(const b of fieldBubbles){ burst(b.x, b.y, '#9fe7ff'); }
      fieldBubbles = [];
      phase = 'combining';
      targetLabelEl.innerHTML = '';
      startMerge(vChar);
    }
  }

  function loseLife(){
    lifeUnits--; // 학습 목적이므로 한 번 실수에 하트 반쪽만 감소
    refreshLives();
    dangerFlash = 1;
    if(lifeUnits <= 0) triggerGameOver();
  }

  // 풍선 더미가 바닥(위험선)까지 내려온 경우
  function fieldReachedBottom(){
    pop(190);
    loseLife();
    if(lifeUnits > 0 && phase === 'field'){
      spawnField(); // gotO / gotVowel 은 그대로 유지 (이미 맞힌 것은 유지)
    }
  }

  function triggerGameOver(){
    running = false;
    phase = 'gameover';
    setTimeout(function(){ gameOverModal.classList.remove('hidden'); }, 300);
  }

  // ---------- ㅇ + 모음 합치기 애니메이션 (가로/세로 퍼즐 또는 겹치기) ----------
  function startMerge(vChar){
    const orientation = VOWEL_ORIENTATION[vowelIndex]; // 'h' | 'v' | 'o'
    const target = {x: W/2, y: H*0.4};
    let fromO, fromV;
    if(orientation === 'v'){
      fromO = {x: target.x, y: -130};
      fromV = {x: target.x, y: H+130};
    } else {
      // 'h'(가로형)와 'o'(겹치기) 모두 좌우에서 날아온다
      fromO = {x: -130, y: target.y};
      fromV = {x: W+130, y: target.y};
    }
    mergeAnim = { fromO, fromV, target, orientation, vChar, t:0, dur:760, snapped:false };
  }

  function showCombine(syll){
    combineText.textContent = syll;
    combineOverlay.classList.add('show');
    playSyllableAudio(vowelIndex);
    targetLabelEl.innerHTML = '';
    fieldSpeed = Math.min(fieldSpeed * 1.03, 0.032);
    // 음성 길이만큼 충분히 보여준 뒤에 다음으로 넘어가서, 발음에 집중할 시간을 줌
    const buf = SYLLABLE_BUFFERS[vowelIndex];
    const audioMs = buf ? buf.duration * 1000 : 2800;
    const holdMs = Math.max(2400, audioMs + 700);
    setTimeout(function(){
      combineOverlay.classList.remove('show');
      vowelIndex++;
      if(vowelIndex >= VOWELS.length){
        phase = 'done';
        refreshProgress();
        for(let i=0;i<4;i++){ setTimeout(spawnFirework, i*220); }
        fireworkTimer = 500;
        setTimeout(function(){ endModal.classList.remove('hidden'); }, 400);
      } else {
        refreshProgress();
        startRound();
      }
    }, holdMs);
  }

  function burst(x,y,color){
    for(let i=0;i<16;i++){
      const a = rand(0,Math.PI*2);
      const sp = rand(2,6);
      particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color });
    }
  }

  // 게임 클리어 축하용 화려한 불꽃놀이
  function spawnFirework(){
    const x = rand(W*0.15, W*0.85);
    const y = rand(H*0.12, H*0.55);
    const hue = Math.floor(rand(0,360));
    const color = 'hsl('+hue+',95%,62%)';
    const color2 = 'hsl('+((hue+40)%360)+',95%,68%)';
    const count = 40;
    for(let i=0;i<count;i++){
      const a = (i/count)*Math.PI*2 + rand(-0.08,0.08);
      const sp = rand(2.2,6.2);
      fireworks.push({
        x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
        life: 1, color: (i%2===0)?color:color2, size: rand(2,4)
      });
    }
  }

  // ---------- 조준/발사 ----------
  let aimPoint = null;
  let aimFlash = 0;

  function getPos(e){
    if(e.touches && e.touches[0]) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
    return {x:e.clientX, y:e.clientY};
  }

  canvas.addEventListener('pointerdown', function(e){
    if(!running || arrow) return;
    if(phase !== 'field') return;
    unlockAudio();
    fireArrow(getPos(e));
  });

  function fireArrow(target){
    const dx = target.x - launcher.x;
    const dy = target.y - launcher.y;
    const dist = Math.hypot(dx,dy);
    if(dist < 5) return;
    const speed = 17;
    aimPoint = target;
    aimFlash = 1;
    arrow = { x: launcher.x, y: launcher.y, vx: (dx/dist)*speed, vy: (dy/dist)*speed, r: 14 };
  }

  // ---------- 이징 함수 ----------
  function easeOutBack(t){
    const c1 = 1.70158, c3 = c1 + 1;
    const x = Math.max(0, Math.min(t,1));
    return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2);
  }

  // ---------- 퍼즐 조각 도형 ----------
  function rectWithRightBump(cx,x,y,w,h,kR){
    cx.beginPath();
    cx.moveTo(x,y);
    cx.lineTo(x+w,y);
    cx.lineTo(x+w, y+h/2-kR);
    cx.arc(x+w, y+h/2, kR, -Math.PI/2, Math.PI/2, false);
    cx.lineTo(x+w, y+h);
    cx.lineTo(x, y+h);
    cx.closePath();
  }
  function rectWithLeftNotch(cx,x,y,w,h,kR){
    cx.beginPath();
    cx.moveTo(x,y);
    cx.lineTo(x+w,y);
    cx.lineTo(x+w,y+h);
    cx.lineTo(x,y+h);
    cx.lineTo(x, y+h/2+kR);
    cx.arc(x, y+h/2, kR, Math.PI/2, -Math.PI/2, true);
    cx.lineTo(x,y);
    cx.closePath();
  }
  function rectWithBottomBump(cx,x,y,w,h,kR){
    cx.beginPath();
    cx.moveTo(x,y);
    cx.lineTo(x+w,y);
    cx.lineTo(x+w,y+h);
    cx.lineTo(x+w/2+kR, y+h);
    cx.arc(x+w/2, y+h, kR, 0, Math.PI, false);
    cx.lineTo(x, y+h);
    cx.closePath();
  }
  function rectWithTopNotch(cx,x,y,w,h,kR){
    cx.beginPath();
    cx.moveTo(x, y+h);
    cx.lineTo(x, y);
    cx.lineTo(x+w/2-kR, y);
    cx.arc(x+w/2, y, kR, Math.PI, 0, true);
    cx.lineTo(x+w, y);
    cx.lineTo(x+w, y+h);
    cx.closePath();
  }

  function drawPuzzlePiece(cx_,cy_,w,h,shapeFn,color,label,scale){
    const sw = w*scale, sh = h*scale;
    const x = cx_ - sw/2, y = cy_ - sh/2;
    const kR = Math.min(sw,sh)*0.22;
    ctx.save();
    shapeFn(ctx, x, y, sw, sh, kR);
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 16;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.fillStyle = '#07304a';
    ctx.font = "700 "+(Math.min(sw,sh)*0.42)+"px 'Noto Sans KR', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, cx_, cy_+2);
    ctx.restore();
  }

  // ---------- 루프 ----------
  function update(dt){
    for(const s of bg){
      s.y -= s.spd*0.001*dt;
      if(s.y < -10){ s.y = H+10; s.x = rand(0,W); }
    }

    if(dangerFlash > 0){ dangerFlash -= 0.025*dt; if(dangerFlash<0) dangerFlash = 0; }
    if(aimFlash > 0){ aimFlash -= 0.05*dt; if(aimFlash<0) aimFlash = 0; }
    if(fieldGrace > 0){ fieldGrace -= dt; if(fieldGrace<0) fieldGrace = 0; }

    // 풍선 더미 전체가 서서히 내려옴
    if(phase === 'field' && fieldBubbles.length){
      fieldDescent += fieldSpeed*dt;
      const t = performance.now()*0.0018;
      let maxBottom = 0;
      for(const b of fieldBubbles){
        b.x = b.bx + Math.sin(t+b.wobbleSeed)*b.wobbleAmp;
        b.y = b.by + fieldDescent;
        if(b.y + b.r > maxBottom) maxBottom = b.y + b.r;
      }
      if(maxBottom > dangerY && fieldGrace <= 0){
        fieldReachedBottom();
      }
    }

    for(const p of particles){
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.035;
    }
    particles = particles.filter(function(p){ return p.life>0; });

    // 게임 클리어 화면에서 계속 터지는 불꽃놀이
    if(phase === 'done'){
      fireworkTimer -= dt;
      if(fireworkTimer <= 0){
        spawnFirework();
        fireworkTimer = rand(450, 750);
      }
      for(const f of fireworks){
        f.x += f.vx; f.y += f.vy; f.vy += 0.045; f.life -= 0.011;
      }
      fireworks = fireworks.filter(function(f){ return f.life > 0; });
    }

    if(mergeAnim){
      mergeAnim.t += dt;
      const k = mergeAnim.t / mergeAnim.dur;
      if(!mergeAnim.snapped && k >= 0.78){
        mergeAnim.snapped = true;
      }
      if(mergeAnim.t >= mergeAnim.dur){
        mergeAnim = null;
        showCombine(composeSyllable(vowelIndex));
      }
    }

    if(arrow){
      arrow.x += arrow.vx*dt*0.06;
      arrow.y += arrow.vy*dt*0.06;

      // 좌우 벽에 튕기기 (각도를 이용한 벽치기 샷)
      if(arrow.x - arrow.r < 0){
        arrow.x = arrow.r;
        arrow.vx = Math.abs(arrow.vx);
        arrow.bounces = (arrow.bounces||0) + 1;
        pop(420);
        for(let i=0;i<6;i++){ particles.push({x:arrow.x,y:arrow.y,vx:rand(0.5,2.5),vy:rand(-2,2),life:0.6,color:'#FFD23F'}); }
      } else if(arrow.x + arrow.r > W){
        arrow.x = W - arrow.r;
        arrow.vx = -Math.abs(arrow.vx);
        arrow.bounces = (arrow.bounces||0) + 1;
        pop(420);
        for(let i=0;i<6;i++){ particles.push({x:arrow.x,y:arrow.y,vx:rand(-2.5,-0.5),vy:rand(-2,2),life:0.6,color:'#FFD23F'}); }
      }

      let hit = false;

      if(phase === 'field'){
        for(let i=0;i<fieldBubbles.length;i++){
          const b = fieldBubbles[i];
          const d = Math.hypot(arrow.x-b.x, arrow.y-b.y);
          if(d < b.r + arrow.r){ hit = true; onFieldBubbleHit(b); break; }
        }
      }
      if(hit || (arrow.bounces||0) > 5 || arrow.y<-50 || arrow.y>H+50){
        arrow = null;
      }
    }
  }

  function drawBg(){
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for(const s of bg){
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawBubble(b){
    ctx.save();
    if(b.glow){ ctx.shadowColor = b.glow; ctx.shadowBlur = 22; }
    const grad = ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.1, b.x,b.y,b.r);
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.35, b.color);
    grad.addColorStop(1, b.color);
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#07304a';
    ctx.font = "700 "+(b.r*0.95)+"px 'Noto Sans KR', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.label, b.x, b.y+1);
    ctx.restore();
  }

  function drawHeartBubble(b){
    ctx.save();
    ctx.shadowColor = 'rgba(255,77,109,0.65)';
    ctx.shadowBlur = 26;
    const grad = ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.1, b.x,b.y,b.r);
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.35, '#FF6FA0');
    grad.addColorStop(1, '#FF4D6D');
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.shadowBlur = 0;
    if(b.hitsTaken >= 1){
      // 한 번 맞은 뒤: 왼쪽 반쪽만 보이게 (오른쪽은 이미 깨짐)
      ctx.beginPath();
      ctx.rect(b.x-b.r, b.y-b.r, b.r, b.r*2);
      ctx.clip();
    }
    ctx.font = (b.r*1.15)+"px sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('❤️', b.x, b.y+1);
    ctx.restore();

    if(b.hitsTaken >= 1){
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y-b.r*0.75);
      ctx.lineTo(b.x-5, b.y-b.r*0.1);
      ctx.lineTo(b.x+5, b.y+b.r*0.25);
      ctx.lineTo(b.x, b.y+b.r*0.75);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawWallHints(){
    const topY = 90;
    const t = performance.now()*0.0022;
    const pulse = 0.4 + 0.35*Math.sin(t);

    ctx.save();
    ctx.globalAlpha = pulse;
    const gradL = ctx.createLinearGradient(0,0,26,0);
    gradL.addColorStop(0,'rgba(255,210,63,0.75)');
    gradL.addColorStop(1,'rgba(255,210,63,0)');
    ctx.fillStyle = gradL;
    ctx.fillRect(0, topY, 26, dangerY-topY);

    const gradR = ctx.createLinearGradient(W,0,W-26,0);
    gradR.addColorStop(0,'rgba(255,210,63,0.75)');
    gradR.addColorStop(1,'rgba(255,210,63,0)');
    ctx.fillStyle = gradR;
    ctx.fillRect(W-26, topY, 26, dangerY-topY);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.6 + 0.4*Math.sin(t);
    ctx.fillStyle = '#FFD23F';
    ctx.font = "22px 'Noto Sans KR', sans-serif";
    ctx.textBaseline = 'middle';
    const span = dangerY - topY;
    for(let k=0;k<3;k++){
      const y = topY + span*(k+0.5)/3;
      ctx.textAlign = 'left';
      ctx.fillText('»', 3, y);
      ctx.textAlign = 'right';
      ctx.fillText('«', W-3, y);
    }
    ctx.restore();
  }

  function drawDangerLine(){
    ctx.save();
    ctx.setLineDash([10,8]);
    ctx.strokeStyle = 'rgba(255,90,90,0.7)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, dangerY);
    ctx.lineTo(W, dangerY);
    ctx.stroke();
    ctx.restore();
  }

  function drawLauncherAndAim(){
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.arc(launcher.x, launcher.y, 22, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    if(aimPoint && aimFlash > 0){
      ctx.save();
      ctx.globalAlpha = Math.min(aimFlash, 1);
      ctx.setLineDash([6,8]);
      ctx.strokeStyle = 'rgba(255,210,63,0.85)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(launcher.x, launcher.y);
      ctx.lineTo(aimPoint.x, aimPoint.y);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawArrow(){
    if(!arrow) return;
    const ang = Math.atan2(arrow.vy, arrow.vx);
    ctx.save();
    ctx.translate(arrow.x, arrow.y);
    ctx.rotate(ang);
    ctx.fillStyle = '#FFD23F';
    ctx.strokeStyle = '#07304a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(12,0); ctx.lineTo(-9,7); ctx.lineTo(-4,0); ctx.lineTo(-9,-7);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  function drawParticles(){
    for(const p of particles){
      ctx.save();
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,5,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawFireworks(){
    for(const f of fireworks){
      ctx.save();
      ctx.globalAlpha = Math.max(f.life,0);
      ctx.shadowColor = f.color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.size, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  // 복합모음(와왜외워웨위의)은 좌우로 붙는 게 아니라 같은 자리에서 서로 겹쳐지며 완성된다
  function easeOutCubic(t){
    const x = Math.max(0, Math.min(t,1));
    return 1 - Math.pow(1-x, 3);
  }

  function drawOverlapMerge(){
    const k   = Math.min(mergeAnim.t / mergeAnim.dur, 1);
    const r   = 64;
    const tx  = mergeAnim.target.x, ty = mergeAnim.target.y;

    // ── 3단계 구분 ──────────────────────────────────────────────
    // 0.00–0.55 : 두 버블이 중앙으로 날아옴 (서로 겹치지 않게 각자 따로 보임)
    // 0.50–0.65 : 합쳐지는 순간 — 섬광(flash)
    // 0.60–1.00 : 실제 완성 글자가 팝업 스케일로 등장
    // ────────────────────────────────────────────────────────────

    // 1단계: 버블 이동 (0→0.55구간)
    const moveT  = Math.min(k / 0.55, 1);
    const eMove  = easeOutCubic(moveT);

    // ㅇ 버블: 왼쪽에서 → 중앙 직전까지 (r*1.4 거리에서 멈춤)
    const stopO  = { x: tx - r*1.35, y: ty };
    const stopV  = { x: tx + r*1.35, y: ty };
    const ox = mergeAnim.fromO.x + (stopO.x - mergeAnim.fromO.x)*eMove;
    const oy = mergeAnim.fromO.y + (stopO.y - mergeAnim.fromO.y)*eMove;
    const vx = mergeAnim.fromV.x + (stopV.x - mergeAnim.fromV.x)*eMove;
    const vy = mergeAnim.fromV.y + (stopV.y - mergeAnim.fromV.y)*eMove;

    // 접근할수록 가속해서 중앙으로 빨려드는 느낌 (0.45→0.55 구간)
    const suckT  = Math.max(0, Math.min((k-0.45)/0.10, 1));
    const suck   = easeOutCubic(suckT);
    const foxFin = ox + (tx - ox)*suck;
    const foyFin = oy + (ty - oy)*suck;
    const fvxFin = vx + (tx - vx)*suck;
    const fvyFin = vy + (ty - vy)*suck;

    // 버블 알파: 0.50 이후 빠르게 사라짐
    const pieceAlpha = Math.max(0, 1 - Math.max(0, (k-0.50)/0.12));

    function drawBubble(x, y, label, color, a){
      if(a < 0.01) return;
      ctx.save();
      ctx.globalAlpha = a;
      // 버블 배경
      ctx.shadowColor = color; ctx.shadowBlur = 18;
      const grad = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
      grad.addColorStop(0, 'rgba(255,255,255,0.9)');
      grad.addColorStop(0.4, color);
      grad.addColorStop(1,   color);
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = grad; ctx.fill();
      // 글자
      ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
      ctx.fillStyle = '#fff';
      ctx.font = "700 "+(r*0.92)+"px 'Noto Sans KR', sans-serif";
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(label, x, y+1);
      ctx.restore();
    }

    drawBubble(foxFin, foyFin, 'ㅇ',            '#FF6B5C', pieceAlpha);
    drawBubble(fvxFin, fvyFin, mergeAnim.vChar, '#FFD23F', pieceAlpha);

    // 2단계: 섬광 (0.50–0.65)
    if(k >= 0.50 && k < 0.70){
      const flashT = Math.min((k-0.50)/0.15, 1);
      const flashA = flashT < 0.5 ? flashT*2 : (1-flashT)*2;
      ctx.save();
      ctx.globalAlpha = flashA * 0.9;
      const fg = ctx.createRadialGradient(tx, ty, 0, tx, ty, 110);
      fg.addColorStop(0, 'rgba(255,255,255,1)');
      fg.addColorStop(0.4, 'rgba(255,230,100,0.8)');
      fg.addColorStop(1,   'rgba(255,200,50,0)');
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.arc(tx, ty, 110, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // 3단계: 실제 완성 글자 팝업 (0.58→1.00)
    if(k >= 0.58){
      const realT  = Math.min((k-0.58)/0.28, 1);
      // easeOutBack으로 살짝 튀어나오는 느낌
      const sc     = easeOutBack(realT);
      const realA  = Math.min(realT * 3, 1); // 빠르게 불투명
      const syll   = composeSyllable(vowelIndex);
      const fs     = r * 1.65 * sc;
      if(fs > 2){
        ctx.save();
        ctx.globalAlpha = realA;
        ctx.shadowColor = 'rgba(255,220,80,0.95)';
        ctx.shadowBlur  = 28;
        ctx.fillStyle   = '#FFFFFF';
        ctx.font        = "800 "+fs+"px 'Noto Sans KR', sans-serif";
        ctx.textAlign   = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(syll, tx, ty+1);
        ctx.restore();
      }
    }
  }

  function drawMergeAnim(){
    if(!mergeAnim) return;
    if(mergeAnim.orientation === 'o'){
      drawOverlapMerge();
      return;
    }

    const k = Math.min(mergeAnim.t / mergeAnim.dur, 1);
    const posT = Math.min(k/0.78, 1);
    const eMove = easeOutBack(posT);
    const pieceW = 100, pieceH = 100;

    let oCenter, vCenter;
    if(mergeAnim.orientation === 'h'){
      oCenter = {x: mergeAnim.target.x - pieceW/2, y: mergeAnim.target.y};
      vCenter = {x: mergeAnim.target.x + pieceW/2, y: mergeAnim.target.y};
    } else {
      oCenter = {x: mergeAnim.target.x, y: mergeAnim.target.y - pieceH/2};
      vCenter = {x: mergeAnim.target.x, y: mergeAnim.target.y + pieceH/2};
    }

    const ox = mergeAnim.fromO.x + (oCenter.x - mergeAnim.fromO.x)*eMove;
    const oy = mergeAnim.fromO.y + (oCenter.y - mergeAnim.fromO.y)*eMove;
    const vx = mergeAnim.fromV.x + (vCenter.x - mergeAnim.fromV.x)*eMove;
    const vy = mergeAnim.fromV.y + (vCenter.y - mergeAnim.fromV.y)*eMove;

    let scale = 1;
    if(posT >= 1){
      const settleT = Math.min((k-0.78)/0.22, 1);
      scale = 1 + Math.sin(settleT*Math.PI)*0.07*(1-settleT);
    }

    const oShape = mergeAnim.orientation === 'h' ? rectWithRightBump : rectWithBottomBump;
    const vShape = mergeAnim.orientation === 'h' ? rectWithLeftNotch : rectWithTopNotch;

    drawPuzzlePiece(ox, oy, pieceW, pieceH, oShape, '#FF6B5C', 'ㅇ', scale);
    drawPuzzlePiece(vx, vy, pieceW, pieceH, vShape, '#FFD23F', mergeAnim.vChar, scale);

    if(posT >= 1){
      const flashT = Math.min((k-0.78)/0.1, 1);
      if(flashT < 1){
        ctx.save();
        ctx.globalAlpha = (1-flashT)*0.9;
        const g = ctx.createRadialGradient(mergeAnim.target.x, mergeAnim.target.y,0, mergeAnim.target.x, mergeAnim.target.y, 95);
        g.addColorStop(0,'rgba(255,255,255,0.95)');
        g.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(mergeAnim.target.x, mergeAnim.target.y, 95, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  function drawDangerFlash(){
    if(dangerFlash <= 0) return;
    ctx.save();
    ctx.globalAlpha = dangerFlash*0.5;
    const g = ctx.createLinearGradient(0,H-220,0,H);
    g.addColorStop(0,'rgba(255,40,40,0)');
    g.addColorStop(1,'rgba(255,40,40,0.55)');
    ctx.fillStyle = g;
    ctx.fillRect(0,H-220,W,220);
    ctx.restore();
  }

  function render(){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0B3D62');
    g.addColorStop(1,'#1C7293');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    drawBg();
    drawDangerLine();
    if(phase === 'field') drawWallHints();
    for(const b of fieldBubbles){ if(b.type==='heart') drawHeartBubble(b); else drawBubble(b); }
    drawParticles();
    drawArrow();
    drawMergeAnim();
    drawLauncherAndAim();
    drawDangerFlash();
    if(phase === 'done') drawFireworks();
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min(now-last, 40);
    last = now;
    try{
      if(running){ update(dt); } else { update(0.0001); }
      render();
    }catch(e){
      console.error('game loop error:', e);
    }
    requestAnimationFrame(loop);
  }

  // ---------- 시작/재시작 ----------
  function beginGame(){
    vowelIndex = 0;
    lifeUnits = MAX_LIFE_UNITS;
    fieldSpeed = BASE_FIELD_SPEED;
    dangerFlash = 0;
    particles = [];
    fireworks = [];
    fireworkTimer = 0;
    arrow = null;
    mergeAnim = null;
    fieldBubbles = [];
    gotO = false; gotVowel = false;
    heartPity = 0;
    spawnBg();
    buildProgress();
    refreshProgress();
    refreshLives();
    running = true;
    startRound();
  }

  const wallTutorial = document.getElementById('wallTutorial');
  let wallTutorialShown = false;

  // ---------- 벽 튕기기 미니 데모 (실제 게임 플레이 화면을 그대로 줄여서 보여줌) ----------
  const demoCanvas = document.getElementById('wallDemoCanvas');
  const demoCtx = demoCanvas.getContext('2d');
  const DW = demoCanvas.width, DH = demoCanvas.height;

  // 실제 게임처럼 ㅇ/모음이 섞인 작은 풍선 더미
  const demoFieldBubbles = [
    {x:34, y:46, label:'ㅇ', color:'#FF6B5C'},
    {x:72, y:42, label:'ㅔ', color:'#FFD23F'},
    {x:110,y:46, label:'ㅇ', color:'#FF6B5C'},
    {x:148,y:42, label:'ㅗ', color:'#FFD23F'},
    {x:186,y:46, label:'ㅖ', color:'#FFD23F'},
    {x:224,y:42, label:'ㅇ', color:'#FF6B5C'},

    {x:52, y:78, label:'ㅒ', color:'#FFD23F'},
    {x:90, y:74, label:'ㅏ', color:'#FFD23F', isTarget:true},
    {x:128,y:78, label:'ㅇ', color:'#FF6B5C'},
    {x:166,y:74, label:'ㅜ', color:'#FFD23F'},
    {x:204,y:78, label:'ㅑ', color:'#FFD23F'},

    {x:34, y:108, label:'ㅢ', color:'#FFD23F'},
    {x:90, y:106, label:'ㅇ', color:'#FF6B5C'},
    {x:148,y:108, label:'ㅓ', color:'#FFD23F'},
    {x:204,y:106, label:'ㅛ', color:'#FFD23F'},
  ];
  const demoTarget = demoFieldBubbles.find(function(b){ return b.isTarget; });
  const demoR = 14;
  const demoDangerY = 156;
  const demoLauncher = { x: DW/2, y: DH-16 };
  const demoBounce = { x: DW-12, y: 122 };
  const DEMO_CYCLE = 2600;
  let demoRunning = false;

  function demoLerp(a,b,k){ return { x: a.x+(b.x-a.x)*k, y: a.y+(b.y-a.y)*k }; }

  function demoState(t){
    if(t < 700){
      const k = t/700;
      return { pos: demoLerp(demoLauncher, demoBounce, k), from: demoLauncher, to: demoBounce, hideTarget:false, flash:0, burst:0 };
    } else if(t < 1350){
      const k = (t-700)/650;
      const flash = t < 850 ? 1-((t-700)/150) : 0;
      return { pos: demoLerp(demoBounce, demoTarget, k), from: demoBounce, to: demoTarget, hideTarget:false, flash, burst:0 };
    } else if(t < 1700){
      const k = (t-1350)/350;
      return { pos: null, hideTarget:true, flash:0, burst:k };
    }
    return { pos: null, hideTarget:true, flash:0, burst:0 };
  }

  function drawDemoBubble(b){
    demoCtx.save();
    const grad = demoCtx.createRadialGradient(b.x-4,b.y-4,2,b.x,b.y,demoR);
    grad.addColorStop(0,'rgba(255,255,255,0.9)');
    grad.addColorStop(0.35,b.color);
    grad.addColorStop(1,b.color);
    demoCtx.beginPath();
    demoCtx.arc(b.x, b.y, demoR, 0, Math.PI*2);
    demoCtx.fillStyle = grad;
    demoCtx.fill();
    demoCtx.lineWidth = 1.6;
    demoCtx.strokeStyle = 'rgba(255,255,255,0.8)';
    demoCtx.stroke();
    demoCtx.fillStyle = '#07304a';
    demoCtx.font = "700 13px 'Noto Sans KR', sans-serif";
    demoCtx.textAlign = 'center';
    demoCtx.textBaseline = 'middle';
    demoCtx.fillText(b.label, b.x, b.y+1);
    demoCtx.restore();
  }

  function drawDemo(){
    const g = demoCtx.createLinearGradient(0,0,0,DH);
    g.addColorStop(0,'#0B3D62');
    g.addColorStop(1,'#1C7293');
    demoCtx.fillStyle = g;
    demoCtx.fillRect(0,0,DW,DH);

    // 미니 상단 UI (하트 + 진행도) — 실제 게임 화면 느낌
    demoCtx.save();
    demoCtx.font = "11px 'Noto Sans KR', sans-serif";
    demoCtx.textAlign = 'left';
    demoCtx.textBaseline = 'middle';
    demoCtx.fillText('❤️❤️❤️', 6, 12);
    demoCtx.restore();
    demoCtx.save();
    for(let i=0;i<8;i++){
      demoCtx.beginPath();
      demoCtx.arc(DW-70+i*9, 12, 3, 0, Math.PI*2);
      demoCtx.fillStyle = i<3 ? '#FFD23F' : 'rgba(255,255,255,0.25)';
      demoCtx.fill();
    }
    demoCtx.restore();

    // 좌우 벽 강조
    demoCtx.save();
    demoCtx.globalAlpha = 0.55;
    demoCtx.fillStyle = '#FFD23F';
    demoCtx.fillRect(0,20,6,demoDangerY-20);
    demoCtx.fillRect(DW-6,20,6,demoDangerY-20);
    demoCtx.restore();

    // 위험선
    demoCtx.save();
    demoCtx.setLineDash([6,5]);
    demoCtx.strokeStyle = 'rgba(255,90,90,0.7)';
    demoCtx.lineWidth = 2;
    demoCtx.beginPath();
    demoCtx.moveTo(0, demoDangerY);
    demoCtx.lineTo(DW, demoDangerY);
    demoCtx.stroke();
    demoCtx.restore();

    const t = performance.now() % DEMO_CYCLE;
    const s = demoState(t);

    for(const b of demoFieldBubbles){
      if(b === demoTarget && s.hideTarget) continue;
      drawDemoBubble(b);
    }

    // 발사대
    demoCtx.save();
    demoCtx.fillStyle = 'rgba(255,255,255,0.25)';
    demoCtx.beginPath();
    demoCtx.arc(demoLauncher.x, demoLauncher.y, 8, 0, Math.PI*2);
    demoCtx.fill();
    demoCtx.restore();

    if(s.flash > 0){
      demoCtx.save();
      demoCtx.globalAlpha = s.flash;
      const fg = demoCtx.createRadialGradient(demoBounce.x,demoBounce.y,0,demoBounce.x,demoBounce.y,18);
      fg.addColorStop(0,'rgba(255,255,255,0.95)');
      fg.addColorStop(1,'rgba(255,255,255,0)');
      demoCtx.fillStyle = fg;
      demoCtx.beginPath();
      demoCtx.arc(demoBounce.x, demoBounce.y, 18, 0, Math.PI*2);
      demoCtx.fill();
      demoCtx.restore();
    }

    if(s.pos){
      const ang = Math.atan2(s.to.y-s.from.y, s.to.x-s.from.x);
      demoCtx.save();
      demoCtx.translate(s.pos.x, s.pos.y);
      demoCtx.rotate(ang);
      demoCtx.fillStyle = '#FFD23F';
      demoCtx.strokeStyle = '#07304a';
      demoCtx.lineWidth = 1.2;
      demoCtx.beginPath();
      demoCtx.moveTo(9,0); demoCtx.lineTo(-6,5); demoCtx.lineTo(-3,0); demoCtx.lineTo(-6,-5);
      demoCtx.closePath();
      demoCtx.fill(); demoCtx.stroke();
      demoCtx.restore();
    }

    if(s.burst > 0){
      demoCtx.save();
      demoCtx.globalAlpha = Math.max(0, 1-s.burst);
      for(let i=0;i<10;i++){
        const a = (i/10)*Math.PI*2;
        const dist = s.burst*22;
        demoCtx.beginPath();
        demoCtx.arc(demoTarget.x+Math.cos(a)*dist, demoTarget.y+Math.sin(a)*dist, 2.5, 0, Math.PI*2);
        demoCtx.fillStyle = '#9fe7ff';
        demoCtx.fill();
      }
      demoCtx.restore();
    }
  }

  function demoLoop(){
    if(!demoRunning) return;
    drawDemo();
    requestAnimationFrame(demoLoop);
  }

  document.getElementById('startBtn').addEventListener('click', function(){
    unlockAudio();
    startModal.classList.add('hidden');
    if(!wallTutorialShown){
      wallTutorialShown = true;
      wallTutorial.classList.remove('hidden');
      demoRunning = true;
      demoLoop();
    } else {
      beginGame();
    }
  });
  document.getElementById('wallTutorialBtn').addEventListener('click', function(){
    demoRunning = false;
    wallTutorial.classList.add('hidden');
    beginGame();
  });
  document.getElementById('restartBtn').addEventListener('click', function(){
    unlockAudio();
    endModal.classList.add('hidden');
    beginGame();
  });
  document.getElementById('retryBtn').addEventListener('click', function(){
    unlockAudio();
    gameOverModal.classList.add('hidden');
    beginGame(); // 리셋되면 학습 진행 상황(모음 진행도)도 처음부터 다시 시작
  });

  buildProgress();
  refreshLives();
  requestAnimationFrame(function(t){ last=t; requestAnimationFrame(loop); });

})();
</script>
</body>
